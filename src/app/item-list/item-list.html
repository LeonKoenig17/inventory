<section>
    <h2>{{ boxName }}</h2>
    <div class="list">
        @for (item of items; track $index) {
            <div class="item">
                <span>{{ item.item_name }}</span>
                <span>{{ item.quantity }}</span>
            </div>
        }
        @if (items.length == 0) {
            <p>No items in this box.</p>
        }
    </div>
</section>
